name: Automated Data Preprocessing Pipeline

on:
  push:
    branches:
      - main  # Runs automatically every time you push code or updates to the main branch
  workflow_dispatch: # Allows you to manually click a "Run workflow" button on GitHub's website

jobs:
  preprocess_job:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Download your code from GitHub 
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: Install Python 3.12.7 
    - name: Set up Python 3.12.7
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'

    # Step 3: Install the required libraries for your automation script
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn seaborn matplotlib

    # Step 4: Run python script to clean and scale the housing data
    - name: Run Automation Preprocessing
      run: |
        python preprocessing/automate_Nama-siswa.py

    # Step 5: Automatically check for data changes, then commit and push the updated dataset back to your repo
    - name: Commit and Push Clean Dataset
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        # Track the exact file output name
        git add preprocessing/housing_preprocessing.csv
        
        # Only commit if changes are detected; prevents endless loop errors if data is identical
        git diff-index --quiet HEAD || git commit -m "Automated Update: housing_preprocessing.csv updated successfully"
        git push